<svg xmlns="http://www.w3.org/2000/svg" width="40" height="32" viewBox="0 0 40 32">
  <!-- Ground shadow -->
  <ellipse cx="20" cy="31" rx="17" ry="2" fill="black" opacity="0.22"/>
  <!-- Left dark face -->
  <polygon points="20,1 2,31 12,31" fill="#4a4a52"/>
  <!-- Right lighter face -->
  <polygon points="20,1 28,31 38,31" fill="#8c8c96"/>
  <!-- Centre mid-tone face -->
  <polygon points="20,1 12,31 28,31" fill="#6a6a74"/>
  <!-- Left edge highlight -->
  <line x1="2" y1="31" x2="20" y2="1" stroke="#9a9aaa" stroke-width="1" opacity="0.5"/>
  <!-- Right edge shadow -->
  <line x1="38" y1="31" x2="20" y2="1" stroke="#2a2a30" stroke-width="1" opacity="0.4"/>
  <!-- Tip bright spot -->
  <polygon points="20,1 22,8 20,6" fill="#d0d0e0" opacity="0.9"/>
  <!-- Base plate -->
  <rect x="2" y="27" width="36" height="4" rx="2" fill="#38383e"/>
  <!-- Base plate highlight -->
  <rect x="4" y="28" width="14" height="2" rx="1" fill="white" opacity="0.18"/>
  <!-- Rivets -->
  <circle cx="8" cy="29" r="1.5" fill="#555560"/>
  <circle cx="20" cy="29" r="1.5" fill="#555560"/>
  <circle cx="32" cy="29" r="1.5" fill="#555560"/>
</svg>
