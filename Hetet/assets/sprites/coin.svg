<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- Drop shadow -->
  <ellipse cx="18" cy="33" rx="13" ry="3" fill="black" opacity="0.18"/>
  <!-- Outer rim (dark gold) -->
  <circle cx="18" cy="17" r="16" fill="#a07008"/>
  <!-- Main coin face -->
  <circle cx="18" cy="17" r="14" fill="#f0b018"/>
  <!-- Inner lighter zone -->
  <circle cx="18" cy="17" r="11" fill="#f8c830"/>
  <!-- Raised edge ring -->
  <circle cx="18" cy="17" r="14" fill="none" stroke="#c89010" stroke-width="2"/>
  <circle cx="18" cy="17" r="11" fill="none" stroke="#e0a820" stroke-width="1.2"/>
  <!-- 5-point star symbol -->
  <path d="M18 8 L20.4 14.6 L27.4 14.6 L21.9 18.6 L24.2 25.2 L18 21.2 L11.8 25.2 L14.1 18.6 L8.6 14.6 L15.6 14.6 Z"
        fill="#ffe040" stroke="#d4a010" stroke-width="0.8"/>
  <!-- Upper-left highlight -->
  <ellipse cx="11" cy="10" rx="5.5" ry="4" fill="white" opacity="0.38" transform="rotate(-20 11 10)"/>
  <!-- Edge rim sparkle -->
  <path d="M6 11 A14 14 0 0 1 28 8" stroke="white" stroke-width="2" fill="none" opacity="0.22" stroke-linecap="round"/>
  <!-- Small sparkle dots -->
  <circle cx="30" cy="9" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="5" cy="22" r="1" fill="white" opacity="0.4"/>
</svg>
